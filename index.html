<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hala Betting – Demo</title>
    <style>
        /* --- CSS Styles --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: #f0f2f5;
            padding: 20px;
        }
        .app {
            max-width: 1200px;
            margin: 0 auto;
        }
        header {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .logo h1 {
            font-size: 2rem;
            letter-spacing: 2px;
        }
        .balance {
            background: rgba(255,255,255,0.2);
            padding: 10px 20px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 1.2rem;
        }
        .main {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 30px;
        }
        .events-section {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .events-section h2 {
            margin-bottom: 20px;
            color: #1e3c72;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
        }
        .event-card {
            border: 1px solid #eee;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            transition: all 0.3s;
        }
        .event-card:hover {
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            border-color: #2a5298;
        }
        .event-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            color: #666;
            font-size: 0.9rem;
        }
        .event-teams {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 15px;
            color: #333;
        }
        .markets {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        .outcome-btn {
            background: #f8f9fa;
            border: 2px solid #dee2e6;
            border-radius: 6px;
            padding: 10px 20px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 600;
            min-width: 100px;
            text-align: center;
        }
        .outcome-btn:hover {
            background: #e9ecef;
            border-color: #adb5bd;
        }
        .outcome-btn.selected {
            background: #2a5298;
            color: white;
            border-color: #1e3c72;
        }
        .bet-slip {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            height: fit-content;
            position: sticky;
            top: 20px;
        }
        .bet-slip h3 {
            margin-bottom: 20px;
            color: #1e3c72;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
        }
        .selected-markets {
            min-height: 100px;
            margin-bottom: 20px;
        }
        .slip-item {
            background: #f8f9fa;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
        }
        .slip-item .remove {
            color: red;
            cursor: pointer;
            font-weight: bold;
        }
        .stake-section {
            margin: 20px 0;
        }
        .stake-section label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
        }
        .stake-section input {
            width: 100%;
            padding: 10px;
            border: 2px solid #dee2e6;
            border-radius: 6px;
            font-size: 1rem;
        }
        .total-odds, .potential-win {
            display: flex;
            justify-content: space-between;
            margin: 10px 0;
            font-weight: 600;
        }
        .place-bet-btn {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 6px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: opacity 0.3s;
        }
        .place-bet-btn:hover {
            opacity: 0.9;
        }
        .place-bet-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .message {
            margin-top: 20px;
            padding: 10px;
            border-radius: 6px;
            display: none;
        }
        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }
        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }
        footer {
            text-align: center;
            margin-top: 30px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="app">
        <header>
            <div class="logo">
                <h1>HALA BETTING</h1>
                <small>Your trusted betting platform</small>
            </div>
            <div class="balance" id="balance">KES 10,000.00</div>
        </header>

        <div class="main">
            <!-- Events List -->
            <section class="events-section">
                <h2>⚽ Upcoming Events</h2>
                <div id="events-container">
                    <!-- Events will be injected here by JavaScript -->
                    <p>Loading events...</p>
                </div>
            </section>

            <!-- Bet Slip -->
            <aside class="bet-slip">
                <h3>🎫 Bet Slip</h3>
                <div id="selected-markets" class="selected-markets">
                    <p style="color:#999;">No selections yet</p>
                </div>
                <div class="stake-section">
                    <label for="stake">Stake (KES):</label>
                    <input type="number" id="stake" min="10" step="10" value="100">
                </div>
                <div class="total-odds">
                    <span>Total Odds:</span>
                    <span id="total-odds">0.00</span>
                </div>
                <div class="potential-win">
                    <span>Potential Win:</span>
                    <span id="potential-win">0.00</span>
                </div>
                <button class="place-bet-btn" id="place-bet" disabled>Place Bet</button>
                <div id="message" class="message"></div>
            </aside>
        </div>

        <footer>
            <p>Demo Frontend for Hala Betting – Use with your backend API</p>
        </footer>
    </div>

    <script>
        // --- JavaScript ---

        // Mock data (replace with API calls)
        const mockEvents = [
            {
                id: 1,
                sport: 'Football',
                league: 'EPL',
                home_team: 'Manchester United',
                away_team: 'Arsenal',
                start_time: '2025-03-15T17:30:00',
                markets: [
                    { id: 101, name: 'Match Winner', outcomes: { home: 2.10, draw: 3.40, away: 3.80 } }
                ]
            },
            {
                id: 2,
                sport: 'Basketball',
                league: 'NBA',
                home_team: 'LA Lakers',
                away_team: 'Golden State',
                start_time: '2025-03-16T02:00:00',
                markets: [
                    { id: 102, name: 'Money Line', outcomes: { home: 1.95, away: 1.95 } }
                ]
            },
            {
                id: 3,
                sport: 'NFL',
                league: 'Super Bowl',
                home_team: 'Kansas City Chiefs',
                away_team: 'San Francisco 49ers',
                start_time: '2025-03-17T23:30:00',
                markets: [
                    { id: 103, name: 'Spread', outcomes: { '-3.5': 1.90, '+3.5': 1.90 } }
                ]
            }
        ];

        // State
        let selectedMarkets = []; // each: { eventId, marketId, outcome, odds, label }
        let userBalance = 10000;

        // DOM elements
        const eventsContainer = document.getElementById('events-container');
        const selectedDiv = document.getElementById('selected-markets');
        const stakeInput = document.getElementById('stake');
        const totalOddsSpan = document.getElementById('total-odds');
        const potentialSpan = document.getElementById('potential-win');
        const placeBetBtn = document.getElementById('place-bet');
        const messageDiv = document.getElementById('message');
        const balanceSpan = document.getElementById('balance');

        // Helper: format currency
        function formatCurrency(amount) {
            return `KES ${amount.toFixed(2)}`;
        }

        // Update balance display
        function updateBalance() {
            balanceSpan.textContent = formatCurrency(userBalance);
        }

        // Calculate total odds and potential win
        function updateBetSlip() {
            if (selectedMarkets.length === 0) {
                totalOddsSpan.textContent = '0.00';
                potentialSpan.textContent = '0.00';
                placeBetBtn.disabled = true;
                return;
            }
            let total = 1;
            selectedMarkets.forEach(m => total *= m.odds);
            totalOddsSpan.textContent = total.toFixed(2);
            const stake = parseFloat(stakeInput.value) || 0;
            const potential = total * stake;
            potentialSpan.textContent = potential.toFixed(2);
            placeBetBtn.disabled = (stake < 10 || selectedMarkets.length === 0);
        }

        // Render selected markets in bet slip
        function renderSelectedMarkets() {
            if (selectedMarkets.length === 0) {
                selectedDiv.innerHTML = '<p style="color:#999;">No selections yet</p>';
                return;
            }
            let html = '';
            selectedMarkets.forEach((m, index) => {
                html += `
                    <div class="slip-item">
                        <span>${m.label} @ ${m.odds.toFixed(2)}</span>
                        <span class="remove" data-index="${index}">✖</span>
                    </div>
                `;
            });
            selectedDiv.innerHTML = html;

            // Attach remove event listeners
            document.querySelectorAll('.remove').forEach(el => {
                el.addEventListener('click', (e) => {
                    const index = e.target.getAttribute('data-index');
                    selectedMarkets.splice(index, 1);
                    renderSelectedMarkets();
                    updateBetSlip();
                    // Also remove 'selected' class from corresponding outcome buttons
                    document.querySelectorAll('.outcome-btn').forEach(btn => {
                        const marketId = btn.getAttribute('data-market-id');
                        const outcome = btn.getAttribute('data-outcome');
                        if (marketId && outcome) {
                            const stillSelected = selectedMarkets.some(m => m.marketId == marketId && m.outcome === outcome);
                            if (!stillSelected) {
                                btn.classList.remove('selected');
                            }
                        }
                    });
                });
            });
            updateBetSlip();
        }

        // Handle outcome click
        function onOutcomeClick(event) {
            const btn = event.currentTarget;
            const marketId = btn.getAttribute('data-market-id');
            const outcome = btn.getAttribute('data-outcome');
            const odds = parseFloat(btn.getAttribute('data-odds'));
            const label = btn.getAttribute('data-label');

            // Check if already selected
            const existingIndex = selectedMarkets.findIndex(m => m.marketId == marketId && m.outcome === outcome);
            if (existingIndex !== -1) {
                // Deselect
                selectedMarkets.splice(existingIndex, 1);
                btn.classList.remove('selected');
            } else {
                // If market already has a selection, remove it first (single selection per market for this demo)
                const sameMarketIndex = selectedMarkets.findIndex(m => m.marketId == marketId);
                if (sameMarketIndex !== -1) {
                    // Remove previous selection
                    const prev = selectedMarkets[sameMarketIndex];
                    const prevBtn = document.querySelector(`.outcome-btn[data-market-id="${marketId}"][data-outcome="${prev.outcome}"]`);
                    if (prevBtn) prevBtn.classList.remove('selected');
                    selectedMarkets.splice(sameMarketIndex, 1);
                }
                // Add new
                selectedMarkets.push({ marketId, outcome, odds, label });
                btn.classList.add('selected');
            }
            renderSelectedMarkets();
        }

        // Render events from data
        function renderEvents(events) {
            if (!events.length) {
                eventsContainer.innerHTML = '<p>No events available</p>';
                return;
            }
            let html = '';
            events.forEach(event => {
                // Format date
                const date = new Date(event.start_time);
                const formattedDate = date.toLocaleString('en-KE', { dateStyle: 'medium', timeStyle: 'short' });

                // Build markets
                let marketsHtml = '';
                event.markets.forEach(market => {
                    marketsHtml += `<div class="market"><strong>${market.name}</strong><div class="markets">`;
                    for (const [outcome, odds] of Object.entries(market.outcomes)) {
                        const label = `${event.home_team} vs ${event.away_team} - ${market.name} - ${outcome}`;
                        marketsHtml += `
                            <div class="outcome-btn" 
                                 data-market-id="${market.id}" 
                                 data-outcome="${outcome}" 
                                 data-odds="${odds}" 
                                 data-label="${label}">
                                ${outcome}<br><small>${odds.toFixed(2)}</small>
                            </div>
                        `;
                    }
                    marketsHtml += '</div></div>';
                });

                html += `
                    <div class="event-card">
                        <div class="event-header">
                            <span>${event.sport} • ${event.league}</span>
                            <span>${formattedDate}</span>
                        </div>
                        <div class="event-teams">
                            ${event.home_team} vs ${event.away_team}
                        </div>
                        <div class="markets">
                            ${marketsHtml}
                        </div>
                    </div>
                `;
            });
            eventsContainer.innerHTML = html;

            // Attach click listeners to outcome buttons
            document.querySelectorAll('.outcome-btn').forEach(btn => {
                btn.addEventListener('click', onOutcomeClick);
            });
        }

        // Place bet (mock API call)
        async function placeBet() {
            const stake = parseFloat(stakeInput.value);
            if (stake < 10) {
                showMessage('Minimum stake is KES 10', 'error');
                return;
            }
            if (selectedMarkets.length === 0) {
                showMessage('No selections', 'error');
                return;
            }
            if (stake > userBalance) {
                showMessage('Insufficient balance', 'error');
                return;
            }

            // Build bet request
            const slips = selectedMarkets.map(m => ({
                marketId: m.marketId,
                outcome: m.outcome,
                odds: m.odds
            }));

            // Mock API call – replace with fetch to your backend
            // For demo, we'll simulate success after 1 second
            placeBetBtn.disabled = true;
            placeBetBtn.textContent = 'Processing...';

            // Simulate API response
            setTimeout(() => {
                // Deduct balance (mock)
                userBalance -= stake;
                updateBalance();
                // Clear bet slip
                selectedMarkets = [];
                renderSelectedMarkets();
                // Remove selected classes
                document.querySelectorAll('.outcome-btn.selected').forEach(btn => btn.classList.remove('selected'));
                // Show success
                showMessage(`Bet placed successfully! Potential win: KES ${(stake * parseFloat(totalOddsSpan.textContent)).toFixed(2)}`, 'success');
                placeBetBtn.disabled = false;
                placeBetBtn.textContent = 'Place Bet';
            }, 1000);

            // Real fetch example:
            /*
            try {
                const response = await fetch('/api/bets', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
                    body: JSON.stringify({ slips, stake })
                });
                const data = await response.json();
                if (response.ok) {
                    userBalance -= stake;
                    updateBalance();
                    selectedMarkets = [];
                    renderSelectedMarkets();
                    showMessage(`Bet placed! Potential win: KES ${data.potentialWin}`, 'success');
                } else {
                    showMessage(data.error || 'Error placing bet', 'error');
                }
            } catch (err) {
                showMessage('Network error', 'error');
            }
            */
        }

        function showMessage(text, type) {
            messageDiv.textContent = text;
            messageDiv.className = `message ${type}`;
            setTimeout(() => {
                messageDiv.style.display = 'none';
            }, 5000);
        }

        // Event listeners
        stakeInput.addEventListener('input', updateBetSlip);
        placeBetBtn.addEventListener('click', placeBet);

        // Initial render
        renderEvents(mockEvents);
        updateBalance();
    </script>
</body>
</html>
